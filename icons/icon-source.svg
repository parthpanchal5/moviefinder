  <g fill="#0b0b0f" opacity=".32">
    <rect x="150" y="150" width="20" height="22" rx="5"/>
    <rect x="150" y="196" width="20" height="22" rx="5"/>
    <rect x="150" y="242" width="20" height="22" rx="5"/>
    <rect x="150" y="288" width="20" height="22" rx="5"/>
    <rect x="150" y="334" width="20" height="22" rx="5"/>
    <rect x="342" y="150" width="20" height="22" rx="5"/>
    <rect x="342" y="196" width="20" height="22" rx="5"/>
    <rect x="342" y="242" width="20" height="22" rx="5"/>
    <rect x="342" y="288" width="20" height="22" rx="5"/>
    <rect x="342" y="334" width="20" height="22" rx="5"/>
  </g>
  <!-- play triangle -->
  <path d="M212 178 L342 256 L212 334 Z" fill="#ffffff"/>
</svg>
